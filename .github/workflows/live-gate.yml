name: Live Gate

# 需仓库 Secrets: LLM_API_KEY（及可选 LLM_BASE_URL）
# 手动触发：Actions → Live Gate → Run workflow

on:
  workflow_dispatch:
    inputs:
      require_live:
        description: "Fail if any check skipped or failed"
        type: boolean
        default: true

jobs:
  live-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -e ".[dev]"

      - name: Start stack
        run: docker compose up -d --build
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}

      - name: Wait for gateway
        run: |
          for i in $(seq 1 40); do
            if curl -sf http://127.0.0.1:8000/healthz; then
              exit 0
            fi
            sleep 3
          done
          docker compose logs
          exit 1

      - name: Run live gate
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          BASE_URL: http://127.0.0.1:8000
        run: |
          ARGS="run --base-url http://127.0.0.1:8000"
          if [ "${{ inputs.require_live }}" = "true" ]; then
            ARGS="$ARGS --require-live"
          fi
          python eval/live_gate.py $ARGS

      - name: Teardown
        if: always()
        run: docker compose down -v
