name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Validate baseline JSONL
        run: |
          python eval/run.py validate-baseline
          python eval/agent_run.py validate-baseline

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e .
      - name: Start stack
        run: docker compose up -d --build
      - name: Wait for gateway
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000/healthz; then
              exit 0
            fi
            sleep 3
          done
          docker compose logs
          exit 1
      - name: Acceptance smoke
        run: python eval/acceptance_smoke.py
      - name: Agent JD2 offline gate
        run: python eval/agent_jd2_gate.py run
      - name: Audit API
        run: |
          curl -sf -H "X-Tenant-Id: admin" -H "Authorization: Bearer sk-tenant-admin-change-me" \
            "http://127.0.0.1:8000/internal/audit/recent?limit=5" | python -c "import sys,json; d=json.load(sys.stdin); assert d.get('count',0)>=1"
      - name: Billing API
        run: |
          curl -sf -H "X-Tenant-Id: admin" -H "Authorization: Bearer sk-tenant-admin-change-me" \
            "http://127.0.0.1:8000/internal/billing/usage?hours=1" | python -c "import sys,json; d=json.load(sys.stdin); assert 'items' in d"
      - name: Teardown
        if: always()
        run: docker compose down -v
