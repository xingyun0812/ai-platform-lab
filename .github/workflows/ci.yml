name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: No packages→apps gateway facades
        run: bash scripts/check_no_packages_import_apps.sh
      - name: Worker must not import apps.gateway.rag
        run: bash scripts/check_worker_no_gateway_rag.sh
      - name: Validate baseline JSONL
        run: |
          python eval/run.py validate-baseline
          python eval/agent_run.py validate-baseline

      - name: Coverage report
        run: |
          python -m pytest tests/ \
            --cov=packages \
            --cov-branch \
            --cov-report=term-missing \
            --cov-report=html:coverage-report \
            --cov-report=json:coverage-report/coverage.json \
            -q
          python -c "
import json
with open('coverage-report/coverage.json') as f:
    d = json.load(f)
pc = d.get('totals', {}).get('percent_covered', 0)
print(f'Overall coverage: {pc:.1f}%')
"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ github.run_id }}
          path: coverage-report/
          retention-days: 14

      - name: Post coverage PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('coverage-report/coverage.json', 'utf8'));
            const t = report.totals || {};
            const body = `## Coverage Report

| Metric | Value |
|--------|-------|
| Lines | ${t.covered_lines || 0} / ${t.num_statements || 0} |
| Branch | ${t.covered_branches || 0} / ${t.num_branches || 0} |
| **Coverage** | **${(t.percent_covered || 0).toFixed(1)}%** |

[Coverage HTML artifact](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

      - name: Security audit
        run: |
          pip install pip-audit
          pip-audit --desc

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Start stack
        run: docker compose up -d --build
      - name: Wait for gateway
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000/healthz; then
              exit 0
            fi
            sleep 3
          done
          docker compose logs
          exit 1
      - name: Acceptance smoke
        run: python eval/acceptance_smoke.py
      - name: Agent JD2 offline gate
        run: python eval/agent_jd2_gate.py run
      - name: Multimodal embedding offline gate
        run: python eval/multimodal_embedding_gate.py run
      - name: Harness capability offline gate
        run: python eval/harness_capability_gate.py run
      - name: Audit API
        run: |
          curl -sf -H "X-Tenant-Id: admin" -H "Authorization: Bearer sk-tenant-admin-change-me" \
            "http://127.0.0.1:8000/internal/audit/recent?limit=5" | python -c "import sys,json; d=json.load(sys.stdin); assert d.get('count',0)>=1"
      - name: Billing API
        run: |
          curl -sf -H "X-Tenant-Id: admin" -H "Authorization: Bearer sk-tenant-admin-change-me" \
            "http://127.0.0.1:8000/internal/billing/usage?hours=1" | python -c "import sys,json; d=json.load(sys.stdin); assert 'items' in d"
      - name: Teardown
        if: always()
        run: docker compose down -v
