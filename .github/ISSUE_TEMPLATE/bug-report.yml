name: "🐛 Bug Report"
description: "报告一个 Bug"
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢上报 Bug！请尽量提供完整信息，方便快速定位。
  - type: textarea
    id: what-happened
    attributes:
      label: "发生了什么？"
      description: "描述你遇到的问题"
      placeholder: "调用 /internal/orchestrator/workflows/smoke-wf/execute 时返回 500..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: "期望行为"
      description: "你认为应该发生什么？"
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: "复现步骤"
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: "Git commit"
      description: "运行 `git log -1 --format=%H` 获取"
      placeholder: "36c1ac6"
    validations:
      required: true
  - type: dropdown
    id: phase
    attributes:
      label: "涉及 Phase"
      options:
        - "Phase F (prompt/memory/mcp/cache)"
        - "Phase G (embedding)"
        - "Phase H (orchestrator/multi-agent/lifecycle/hitl)"
        - "Phase I (sandbox/audit/pii/auth)"
        - "其他/不确定"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: "错误日志"
      description: "完整 traceback（如有）"
      render: shell
  - type: textarea
    id: env
    attributes:
      label: "环境"
      value: |
        - OS:
        - Python:
        - 是否配置 LLM_API_KEY:
        - 是否配置 Postgres/Redis:
