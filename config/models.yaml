# 模型路由：别名映射 + 失败降级链
# 上游：内网 OpenAI 兼容网关（见 .env LLM_BASE_URL）
# 可用模型：deepseek-v4-flash-thinking | deepseek-v4-flash | minimax-m2.7

aliases:
  chat-fast: deepseek-v4-flash
  chat-strong: deepseek-v4-flash-thinking
  chat-thinking: deepseek-v4-flash-thinking
  chat-fast-v4: deepseek-v4-flash
  chat-minimax: minimax-m2.7

fallback_chains:
  deepseek-v4-flash:
    - deepseek-v4-flash
    - minimax-m2.7
  deepseek-v4-flash-thinking:
    - deepseek-v4-flash-thinking
    - deepseek-v4-flash
  minimax-m2.7:
    - minimax-m2.7
    - deepseek-v4-flash
  default:
    - deepseek-v4-flash
