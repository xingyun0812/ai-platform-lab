# RAG 管道默认参数（可被环境变量覆盖，见 settings）
chunk_size: 512
chunk_overlap: 64

# 第 3 周：检索相关度阈值（Cosine 分，低于此不入 LLM）
min_score: 0.35
prompt_path: config/rag_prompt.txt

# Phase B2：检索模式 vector | hybrid（BM25 + 向量 RRF 融合）
retrieval_mode: vector
bm25_top_k: 20
hybrid_rrf_k: 60

# Phase B3：rerank + kb 版本金丝雀
rerank_enabled: false
rerank_mode: stub
rerank_top_n: 10

# 按 kb_id 配置金丝雀；canary_percent=0 时 100% stable_version（或 latest）
kb_routing:
  lab-demo:
    stable_version: 1
    canary_version: 2
    canary_percent: 0
