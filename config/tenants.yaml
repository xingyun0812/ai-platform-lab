# 三假租户（与《AI中台学习执行手册》一致）。Bearer 与 X-Tenant-Id 须同时匹配同一租户。
# 生产环境请改用密钥管理系统；本地可把 token 改成自己的随机串。
#
# 第 6 周：default_model 可为 config/models.yaml 中的别名；rate_limit_* 为令牌桶。
# Phase B：token_budget_* 为 Postgres 计量预算（-1 不限）；需 DATABASE_URL。
defaults:
  rate_limit_rps: 20
  rate_limit_burst: 40

tenants:
  demo-a:
    data_zone: CN
    home_region: cn-local
    role: developer
    bearer_token: "sk-tenant-demo-a-change-me"
    # bearer_secret_ref: tenants/demo-a/bearer  # Vault/env 模式，与 bearer_token 二选一
    daily_request_quota: 1000
    default_model: chat-fast
    allowed_models:
      - "chat-fast"
      - "chat-thinking"
      - "chat-minimax"
      - "deepseek-v4-flash-thinking"
      - "deepseek-v4-flash"
      - "minimax-m2.7"
    # 仅允许知识库检索与计算器（不可调用 httpbin_delay）
    allowed_tools:
      - "get_kb_snippet"
      - "calc"
  demo-b:
    bearer_token: "sk-tenant-demo-b-change-me"
    daily_request_quota: 200
    rate_limit_rps: 2
    rate_limit_burst: 2
    token_budget_daily: 500
    token_budget_monthly: 5000
    allowed_models:
      - "deepseek-v4-flash"
      - "chat-fast"
    allowed_tools:
      - "calc"
  admin:
    role: platform_admin
    bearer_token: "sk-tenant-admin-change-me"
    daily_request_quota: -1
    # 空列表表示不限制模型（中台开发自用）
    allowed_models: []
    # 空列表表示可用全部注册工具
    allowed_tools: []
