# 工具动作分类配置
# Phase I #42 — 动作分级审计
#
# action_level: read_only | write | destructive | network | unknown
# requires_approval: 是否强制要求审批（destructive 默认强制）

classifications:
  - tool_name: calc
    action_level: read_only
    requires_approval: false
    description: 本地计算器，纯只读

  - tool_name: get_kb_snippet
    action_level: read_only
    requires_approval: false
    description: 知识库检索，只读

  - tool_name: search_web_stub
    action_level: network
    requires_approval: false
    description: Web 搜索（网络请求）

  - tool_name: httpbin_delay
    action_level: network
    requires_approval: false
    description: httpbin 延迟接口（网络请求）

  - tool_name: math_llm_stub
    action_level: read_only
    requires_approval: false
    description: 数学 LLM stub，只读

  - tool_name: delete_file
    action_level: destructive
    requires_approval: true
    description: 删除文件（高危）

  - tool_name: drop_table
    action_level: destructive
    requires_approval: true
    description: 删除数据库表（高危）

  - tool_name: send_email
    action_level: write
    requires_approval: false
    description: 发送邮件

  - tool_name: create_record
    action_level: write
    requires_approval: false
    description: 创建数据库记录
