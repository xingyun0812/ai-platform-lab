# Embedding 模型（内网网关 OpenAI 兼容 /v1/embeddings）
# 默认：Qwen/Qwen3-Embedding-8B，4096 维 — 与 .env EMBEDDING_* 保持一致

models:
  - model_id: Qwen/Qwen3-Embedding-8B
    name: Qwen3 Embedding 8B（内网网关默认）
    provider: openai
    dimensions: 4096
    max_input_tokens: 8192
    metadata:
      gateway: http://10.212.129.94:8090/v1

  - model_id: text-embedding-3-small
    name: OpenAI text-embedding-3-small（官方，内网网关不可用）
    provider: openai
    dimensions: 1536
    max_input_tokens: 8191
    metadata:
      legacy: true

  - model_id: stub-embedding
    name: Stub Embedding (test/dev)
    provider: stub
    dimensions: 4096
    max_input_tokens: 99999
    modalities: [text]
    metadata:
      note: 单测用；维度与 Qwen 对齐时可设为 4096

  - model_id: stub-multimodal
    name: Stub Multimodal Embedding (text + image)
    provider: stub
    dimensions: 4096
    max_input_tokens: 99999
    modalities: [text, image]
    metadata:
      note: Phase P 多模态 CI/dev；image 走确定性 stub 向量
