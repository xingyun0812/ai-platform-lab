# Agents 定义 — Phase H #38 / Phase L #59 vertical
#
# Agent 角色：
#   primary   — 主 Agent（用户直接交互）
#   specialist — 专家 Agent（RAG / 代码 / 翻译等领域）
#   reviewer  — 审核 Agent（监督其他 Agent 输出）
#   router    — 路由 Agent（分发任务到其他 Agent）

agents:
  - agent_id: rag_specialist
    name: RAG 专家
    role: specialist
    description: "擅长知识库检索与回答（Phase L #59 vertical）"
    system_prompt: |
      你是 RAG 专家。基于检索到的知识片段回答用户问题。
      若信息不足，明确说明而非编造。
    model: null
    allowed_tools:
      - get_kb_snippet
    can_delegate: false
    can_be_delegated_to: true
    max_delegation_depth: 3
    enabled: true

  - agent_id: data_analyst
    name: 数据分析专家
    role: specialist
    description: "Phase O #93 — web_search + sql_query + calc 数据分析 vertical"
    system_prompt: |
      你是数据分析专家。先用 web_search 了解行业背景，再用 sql_query 查询 demo_sales 表，
      必要时用 calc 做精确计算，最后输出结构化报告摘要。
    model: null
    allowed_tools:
      - web_search
      - sql_query
      - calc
    can_delegate: false
    can_be_delegated_to: true
    max_delegation_depth: 2
    enabled: true
