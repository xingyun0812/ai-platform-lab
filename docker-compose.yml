name: ai-platform-lab

# 默认 `docker compose up` 不会启动任何服务（均带 profile）。
# 需要本地向量库时：docker compose --profile vectors up -d

services:
  qdrant:
    image: qdrant/qdrant:v1.12.5
    profiles: ["vectors"]
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  qdrant_storage: {}
