name: ai-platform-lab

# 第 6 周：默认一键启动 gateway + Qdrant
#   docker compose up -d --build
# 可选独立 worker profile（当前索引仍在 gateway 后台执行，见 apps/worker）：
#   docker compose --profile worker up -d

services:
  qdrant:
    image: qdrant/qdrant:v1.12.5
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333'"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  gateway:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      QDRANT_URL: http://qdrant:6333
      RAG_DATA_ROOT: /app/data/rag
      TENANTS_CONFIG_PATH: /app/config/tenants.yaml
      MODELS_CONFIG_PATH: /app/config/models.yaml
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
      - gateway_rag_work:/app/data/rag/work
    depends_on:
      qdrant:
        condition: service_healthy

  worker:
    profiles: ["worker"]
    build: .
    command: ["python", "-m", "apps.worker.main"]
    env_file:
      - path: .env
        required: false
    environment:
      QDRANT_URL: http://qdrant:6333
    depends_on:
      qdrant:
        condition: service_healthy
      gateway:
        condition: service_started

volumes:
  qdrant_storage: {}
  gateway_rag_work: {}
