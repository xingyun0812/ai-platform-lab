name: ai-platform-lab

# Phase A/B：默认一键启动 postgres + redis + gateway + worker + Qdrant
#   docker compose up -d --build

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aiplatform
      POSTGRES_PASSWORD: aiplatform
      POSTGRES_DB: ai_platform_lab
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiplatform -d ai_platform_lab"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.12.5
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333'"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  gateway:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql://aiplatform:aiplatform@postgres:5432/ai_platform_lab
      REDIS_URL: redis://redis:6379/0
      USE_INDEX_WORKER: "true"
      QDRANT_URL: http://qdrant:6333
      RAG_DATA_ROOT: /app/data/rag
      AUDIT_DB_PATH: /app/data/audit.db
      TENANTS_CONFIG_PATH: /app/config/tenants.yaml
      MODELS_CONFIG_PATH: /app/config/models.yaml
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
      - gateway_rag_work:/app/data/rag/work
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  worker:
    build: .
    command: ["python", "-m", "apps.worker.main", "--poll-seconds", "3"]
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql://aiplatform:aiplatform@postgres:5432/ai_platform_lab
      REDIS_URL: redis://redis:6379/0
      USE_INDEX_WORKER: "true"
      QDRANT_URL: http://qdrant:6333
      RAG_DATA_ROOT: /app/data/rag
      TENANTS_CONFIG_PATH: /app/config/tenants.yaml
      MODELS_CONFIG_PATH: /app/config/models.yaml
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
      - gateway_rag_work:/app/data/rag/work
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      gateway:
        condition: service_started

  # Phase B2 可选：docker compose --profile vault up -d
  vault:
    profiles: ["vault"]
    image: hashicorp/vault:1.16
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-only-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    command: server -dev

  # Phase B2 可选：docker compose --profile observability up -d
  otel-collector:
    profiles: ["observability"]
    image: otel/opentelemetry-collector-contrib:0.96.0
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./config/otel-collector.yaml:/etc/otel-collector.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      jaeger:
        condition: service_started

  jaeger:
    profiles: ["observability"]
    image: jaegertracing/all-in-one:1.56
    ports:
      - "16686:16686"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  prometheus:
    profiles: ["observability"]
    image: prom/prometheus:v2.51.0
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      gateway:
        condition: service_started

volumes:
  postgres_data: {}
  qdrant_storage: {}
  gateway_rag_work: {}
