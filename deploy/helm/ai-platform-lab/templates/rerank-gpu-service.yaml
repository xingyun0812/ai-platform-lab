{{- if .Values.rerank.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ai-platform-lab.fullname" . }}-rerank
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-platform-lab.labels" . | nindent 4 }}
    app.kubernetes.io/component: rerank
  annotations:
    # Internal service only — no ingress exposure
    # Gateway routes /v1/rerank internally to this ClusterIP
    ai-platform-lab.io/gpu-accelerated: "true"
spec:
  type: ClusterIP
  selector:
    {{- include "ai-platform-lab.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: rerank
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.rerank.servicePort | default 8200 }}
      targetPort: {{ .Values.rerank.port | default 8000 }}
{{- end }}
