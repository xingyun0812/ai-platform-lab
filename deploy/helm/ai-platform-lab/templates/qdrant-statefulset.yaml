{{- if .Values.qdrant.enabled }}
{{- if not .Values.qdrant.external.url }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "ai-platform-lab.fullname" . }}-qdrant
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-platform-lab.labels" . | nindent 4 }}
    app.kubernetes.io/component: qdrant
spec:
  serviceName: {{ include "ai-platform-lab.fullname" . }}-qdrant-headless
  replicas: {{ .Values.qdrant.replicas }}
  selector:
    matchLabels:
      {{- include "ai-platform-lab.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: qdrant
  template:
    metadata:
      labels:
        {{- include "ai-platform-lab.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: qdrant
    spec:
      {{- include "ai-platform-lab.imagePullSecrets" . | nindent 6 }}
      securityContext:
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: qdrant
          image: "{{ .Values.qdrant.image.repository }}:{{ .Values.qdrant.image.tag }}"
          imagePullPolicy: {{ .Values.qdrant.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.qdrant.service.httpPort }}
              protocol: TCP
            - name: grpc
              containerPort: {{ .Values.qdrant.service.grpcPort }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.qdrant.service.httpPort }}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.qdrant.service.httpPort }}
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            {{- toYaml .Values.qdrant.resources | nindent 12 }}
          volumeMounts:
            - name: qdrant-data
              mountPath: /qdrant/storage
      {{- with .Values.qdrant.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.qdrant.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.qdrant.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.qdrant.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: qdrant-data
        labels:
          {{- include "ai-platform-lab.labels" . | nindent 10 }}
          app.kubernetes.io/component: qdrant
      spec:
        accessModes:
          - {{ .Values.qdrant.persistence.accessMode }}
        {{- if .Values.qdrant.persistence.storageClass }}
        storageClassName: {{ .Values.qdrant.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.qdrant.persistence.size }}
  {{- else }}
  # No persistence — using emptyDir (data will be lost on pod restart)
  # Set qdrant.persistence.enabled=true for production
  {{- end }}
{{- end }}
{{- end }}
