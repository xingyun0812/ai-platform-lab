{{- $fullName := include "ai-platform-lab.fullname" . -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $fullName }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-platform-lab.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  {{- if .Values.secrets.llmApiKey }}
  # WARNING: Storing secrets inline is insecure. Use secretKeyRef in production.
  llm-api-key: {{ .Values.secrets.llmApiKey | b64enc | quote }}
  {{- else }}
  llm-api-key: {{ "" | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.redisPassword }}
  redis-password: {{ .Values.secrets.redisPassword | b64enc | quote }}
  {{- else if .Values.redis.auth.password }}
  redis-password: {{ .Values.redis.auth.password | b64enc | quote }}
  {{- else }}
  redis-password: {{ "" | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.postgresPassword }}
  postgres-password: {{ .Values.secrets.postgresPassword | b64enc | quote }}
  {{- else if .Values.postgres.auth.password }}
  postgres-password: {{ .Values.postgres.auth.password | b64enc | quote }}
  {{- else }}
  postgres-password: {{ "" | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.jwtSecret }}
  jwt-secret: {{ .Values.secrets.jwtSecret | b64enc | quote }}
  {{- else }}
  jwt-secret: {{ "" | b64enc | quote }}
  {{- end }}
