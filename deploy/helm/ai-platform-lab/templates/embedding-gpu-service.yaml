{{- if .Values.embedding.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ai-platform-lab.fullname" . }}-embedding
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-platform-lab.labels" . | nindent 4 }}
    app.kubernetes.io/component: embedding
  annotations:
    # Internal service only — no ingress exposure
    # Gateway routes /v1/embeddings internally to this ClusterIP
    ai-platform-lab.io/gpu-accelerated: "true"
spec:
  type: ClusterIP
  selector:
    {{- include "ai-platform-lab.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: embedding
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.embedding.servicePort | default 8100 }}
      targetPort: {{ .Values.embedding.port | default 8000 }}
{{- end }}
