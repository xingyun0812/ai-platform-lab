{{- if .Values.qdrant.enabled }}
{{- if not .Values.qdrant.external.url }}
# Headless service for StatefulSet DNS resolution
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ai-platform-lab.fullname" . }}-qdrant-headless
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-platform-lab.labels" . | nindent 4 }}
    app.kubernetes.io/component: qdrant
spec:
  clusterIP: None
  selector:
    {{- include "ai-platform-lab.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: qdrant
  ports:
    - name: http
      port: {{ .Values.qdrant.service.httpPort }}
      targetPort: http
      protocol: TCP
    - name: grpc
      port: {{ .Values.qdrant.service.grpcPort }}
      targetPort: grpc
      protocol: TCP
---
# ClusterIP service for application access
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ai-platform-lab.fullname" . }}-qdrant
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-platform-lab.labels" . | nindent 4 }}
    app.kubernetes.io/component: qdrant
spec:
  type: {{ .Values.qdrant.service.type }}
  selector:
    {{- include "ai-platform-lab.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: qdrant
  ports:
    - name: http
      port: {{ .Values.qdrant.service.httpPort }}
      targetPort: http
      protocol: TCP
    - name: grpc
      port: {{ .Values.qdrant.service.grpcPort }}
      targetPort: grpc
      protocol: TCP
{{- end }}
{{- end }}
